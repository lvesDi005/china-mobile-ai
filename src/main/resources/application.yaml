#        options:
#          # model: gpt-3.5-turbo #模型名称
#          model: qwen-plus #模型名称
#          # enabled: false #关闭OpenAI配置

logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG
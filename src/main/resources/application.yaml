server:
  port: 8099  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  application:
    name: china-mobile-ai
  ai:
    dashscope:
      api-key: # 填入自己的百炼api-key
      chat:
        options:
          model: qwen-plus
      client:
        advisor: DEBUG
      embedding:
        options:
          model: text-embedding-v3 #向量模型
          dimensions: 1024 #向量维度维度
